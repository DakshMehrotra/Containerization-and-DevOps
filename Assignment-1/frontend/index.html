<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlowTask</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Epilogue:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── Tokens ── */
:root {
  --bg:        #080b10;
  --bg2:       #0d1117;
  --surface:   #111820;
  --surface2:  #161f2b;
  --border:    #1e2d3d;
  --border2:   #243447;
  --neon-g:    #00ffa3;
  --neon-b:    #00c8ff;
  --neon-y:    #ffd166;
  --neon-r:    #ff4d6d;
  --neon-p:    #c77dff;
  --text:      #dde8f0;
  --muted:     #4a6077;
  --dim:       #2a3e52;
  --low-c:     #00ffa3;
  --med-c:     #ffd166;
  --high-c:    #ff4d6d;
  --fh: 'Epilogue', sans-serif;
  --fm: 'Space Mono', monospace;
  --r: 6px;
}

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

html, body { height: 100%; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--fm);
  font-size: 13px;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Scanlines */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.07) 2px,rgba(0,0,0,0.07) 4px);
  pointer-events: none;
  z-index: 9999;
}

/* Glow orbs */
.orb { position: fixed; border-radius: 50%; filter: blur(100px); pointer-events: none; z-index: 0; }
.orb-1 { width:600px; height:600px; background:rgba(0,200,255,0.055); top:-200px; right:-200px; }
.orb-2 { width:500px; height:500px; background:rgba(0,255,163,0.045); bottom:-100px; left:-150px; }
.orb-3 { width:300px; height:300px; background:rgba(255,77,109,0.035); top:40%; left:40%; }

/* ── Shell ── */
.shell {
  position: relative;
  z-index: 1;
  display: grid;
  grid-template-columns: 260px 1fr;
  min-height: 100vh;
}

/* ══════════════════════
   SIDEBAR
══════════════════════ */
.sidebar {
  background: var(--bg2);
  border-right: 1px solid var(--border);
  padding: 32px 20px;
  display: flex;
  flex-direction: column;
  gap: 28px;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
}

.logo { padding-bottom: 24px; border-bottom: 1px solid var(--border); }
.logo-eyebrow { font-size: 9px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--neon-b); opacity: 0.7; }
.logo-word { font-family: var(--fh); font-size: 28px; font-weight: 900; letter-spacing: -0.03em; line-height: 1.1; color: var(--text); }
.logo-word em { font-style: normal; color: var(--neon-g); text-shadow: 0 0 20px rgba(0,255,163,0.5); }
.conn-pill { display: inline-flex; align-items: center; gap: 6px; font-size: 10px; color: var(--muted); margin-top: 8px; letter-spacing: 0.05em; }
.conn-dot { width:6px; height:6px; border-radius:50%; background:var(--muted); transition: background 0.4s, box-shadow 0.4s; flex-shrink:0; }
.conn-dot.on  { background: var(--neon-g); box-shadow: 0 0 8px rgba(0,255,163,0.7); }
.conn-dot.off { background: var(--high-c); box-shadow: 0 0 8px rgba(255,77,109,0.5); }

/* Ring */
.ring-group { display: flex; flex-direction: column; gap: 12px; }
.ring-label { font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); }
.ring-row { display: flex; align-items: center; gap: 14px; }
.ring-wrap { position: relative; width: 56px; height: 56px; flex-shrink: 0; }
.ring-wrap svg { transform: rotate(-90deg); }
.ring-track { fill: none; stroke: var(--border); stroke-width: 3.5; }
.ring-fill  { fill: none; stroke-width: 3.5; stroke-linecap: round; transition: stroke-dashoffset 0.9s cubic-bezier(.4,0,.2,1); }
.ring-center { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-family: var(--fh); font-size: 13px; font-weight: 700; color: var(--text); }
.ring-info-title { font-family: var(--fh); font-size: 16px; font-weight: 700; color: var(--text); }
.ring-info-sub   { font-size: 10px; color: var(--muted); margin-top: 3px; }

/* Stat grid */
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.stat-tile { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 12px; transition: border-color 0.2s; }
.stat-tile:hover { border-color: var(--border2); }
.stat-n { font-family: var(--fh); font-size: 28px; font-weight: 900; line-height: 1; }
.stat-n.g { color: var(--neon-g); text-shadow: 0 0 12px rgba(0,255,163,0.4); }
.stat-n.y { color: var(--neon-y); text-shadow: 0 0 12px rgba(255,209,102,0.4); }
.stat-n.r { color: var(--neon-r); text-shadow: 0 0 12px rgba(255,77,109,0.4); }
.stat-n.b { color: var(--neon-b); text-shadow: 0 0 12px rgba(0,200,255,0.4); }
.stat-l   { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-top: 4px; }

.sidebar-date { margin-top: auto; padding-top: 20px; border-top: 1px solid var(--border); font-size: 10px; color: var(--muted); line-height: 1.8; letter-spacing: 0.04em; }

/* ══════════════════════
   MAIN
══════════════════════ */
.main { display: flex; flex-direction: column; min-height: 100vh; background: var(--bg); }

.topbar {
  padding: 18px 32px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
  background: rgba(8,11,16,0.9);
  backdrop-filter: blur(12px);
  position: sticky;
  top: 0;
  z-index: 50;
}
.topbar-title { font-family: var(--fh); font-size: 17px; font-weight: 700; color: var(--text); margin-right: auto; letter-spacing: 0.02em; }
.topbar-pill { font-size: 10px; color: var(--muted); background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 4px 10px; letter-spacing: 0.04em; }

.content { padding: 24px 32px; flex: 1; display: flex; flex-direction: column; gap: 18px; }

/* ── Add panel ── */
.add-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 18px 20px;
  transition: border-color 0.3s, box-shadow 0.3s;
}
.add-panel:focus-within {
  border-color: rgba(0,200,255,0.3);
  box-shadow: 0 0 0 1px rgba(0,200,255,0.07), 0 8px 32px rgba(0,0,0,0.3);
}
.add-label { font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
.add-row { display: flex; gap: 10px; }
.add-input {
  flex: 1;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: var(--r);
  padding: 11px 16px;
  font-family: var(--fm);
  font-size: 13px;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  caret-color: var(--neon-b);
}
.add-input::placeholder { color: var(--dim); }
.add-input:focus { border-color: rgba(0,200,255,0.4); box-shadow: 0 0 0 3px rgba(0,200,255,0.06); }

.pri-pills { display: flex; gap: 6px; margin-top: 10px; }
.pri-pill {
  font-family: var(--fm);
  font-size: 10px;
  padding: 7px 14px;
  border-radius: var(--r);
  border: 1px solid var(--border2);
  background: var(--surface2);
  color: var(--muted);
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.pri-pill:hover { color: var(--text); }
.pri-pill.sel-low    { background: rgba(0,255,163,0.1);  border-color: rgba(0,255,163,0.4);  color: var(--neon-g); }
.pri-pill.sel-medium { background: rgba(255,209,102,0.1);border-color: rgba(255,209,102,0.4);color: var(--neon-y); }
.pri-pill.sel-high   { background: rgba(255,77,109,0.1); border-color: rgba(255,77,109,0.4); color: var(--neon-r); }

.btn-add {
  font-family: var(--fh);
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0.06em;
  background: var(--neon-b);
  color: var(--bg);
  border: none;
  border-radius: var(--r);
  padding: 0 24px;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
  position: relative;
  overflow: hidden;
}
.btn-add::after { content:''; position:absolute; inset:0; background:linear-gradient(135deg,rgba(255,255,255,0.15) 0%,transparent 60%); }
.btn-add:hover { background:#33d4ff; box-shadow: 0 0 24px rgba(0,200,255,0.45); transform: translateY(-1px); }
.btn-add:active { transform: translateY(0); box-shadow: none; }
.btn-add:disabled { opacity: 0.35; cursor: not-allowed; transform: none; box-shadow: none; }

/* ── Filter bar ── */
.filter-bar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.search-wrap { position: relative; flex: 1; min-width: 200px; }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 14px; pointer-events: none; line-height: 1; }
.search-input {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 9px 14px 9px 34px;
  font-family: var(--fm);
  font-size: 12px;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s;
  caret-color: var(--neon-b);
}
.search-input::placeholder { color: var(--muted); }
.search-input:focus { border-color: rgba(0,200,255,0.35); }
.filter-sep { width: 1px; height: 24px; background: var(--border); }
.fchip {
  font-family: var(--fm);
  font-size: 10px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 7px 12px;
  border-radius: var(--r);
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--muted);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.fchip:hover { color: var(--text); border-color: var(--border2); }
.fchip.active { background: var(--surface2); color: var(--text); border-color: var(--border2); }
.fchip[data-val="high"].active   { background:rgba(255,77,109,0.1); border-color:rgba(255,77,109,0.4);  color:var(--neon-r); }
.fchip[data-val="medium"].active { background:rgba(255,209,102,0.1);border-color:rgba(255,209,102,0.4);color:var(--neon-y); }
.fchip[data-val="low"].active    { background:rgba(0,255,163,0.1);  border-color:rgba(0,255,163,0.4);  color:var(--neon-g); }
.fchip[data-val="todo"].active        { border-color:var(--neon-b); color:var(--neon-b); background:rgba(0,200,255,0.07); }
.fchip[data-val="in_progress"].active { border-color:var(--neon-p); color:var(--neon-p); background:rgba(199,125,255,0.07); }
.fchip[data-val="done"].active        { border-color:var(--neon-g); color:var(--neon-g); background:rgba(0,255,163,0.07); }

/* ── Kanban ── */
.kanban { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; flex: 1; }
.col {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-height: 300px;
}
.col-head {
  padding: 13px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
  background: rgba(13,17,23,0.6);
}
.col-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.col-dot.todo { background: var(--neon-b); box-shadow: 0 0 7px rgba(0,200,255,0.6); }
.col-dot.prog { background: var(--neon-p); box-shadow: 0 0 7px rgba(199,125,255,0.6); }
.col-dot.done { background: var(--neon-g); box-shadow: 0 0 7px rgba(0,255,163,0.6); }
.col-title { font-family: var(--fh); font-size: 12px; font-weight: 700; color: var(--text); letter-spacing: 0.08em; flex: 1; text-transform: uppercase; }
.col-count { font-size: 10px; color: var(--muted); background: var(--surface); border: 1px solid var(--border); border-radius: 100px; padding: 2px 8px; }
.col-body { padding: 10px; flex: 1; display: flex; flex-direction: column; gap: 8px; overflow-y: auto; }

/* ── Task card ── */
.task-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px;
  transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
  animation: cardIn 0.3s ease both;
  position: relative;
  overflow: hidden;
}
@keyframes cardIn { from { opacity:0; transform:translateY(8px) scale(0.98); } to { opacity:1; transform:none; } }

.task-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  opacity: 0.8;
}
.task-card.p-low::before    { background: var(--neon-g); }
.task-card.p-medium::before { background: var(--neon-y); }
.task-card.p-high::before   { background: var(--neon-r); box-shadow: 0 0 12px rgba(255,77,109,0.4); }

.task-card:hover { border-color: var(--border2); transform: translateY(-2px); box-shadow: 0 8px 28px rgba(0,0,0,0.45); }
.task-card.done-card { opacity: 0.45; }
.task-card.done-card .task-title { text-decoration: line-through; color: var(--muted); }

.card-top { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 10px; }
.task-title { flex: 1; font-family: var(--fh); font-size: 14px; font-weight: 500; color: var(--text); line-height: 1.4; word-break: break-word; }
.btn-del {
  background: none; border: none; cursor: pointer;
  color: var(--dim); font-size: 16px; line-height: 1;
  padding: 2px 4px; border-radius: 3px;
  transition: color 0.15s, background 0.15s;
  flex-shrink: 0; margin-top: -1px;
}
.btn-del:hover { color: var(--neon-r); background: rgba(255,77,109,0.1); }

.card-foot { display: flex; align-items: center; justify-content: space-between; }
.pri-badge { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; padding: 3px 8px; border-radius: 3px; }
.pri-badge.low    { color: var(--neon-g); background: rgba(0,255,163,0.1); }
.pri-badge.medium { color: var(--neon-y); background: rgba(255,209,102,0.1); }
.pri-badge.high   { color: var(--neon-r); background: rgba(255,77,109,0.1); }
.card-date { font-size: 9px; color: var(--muted); letter-spacing: 0.05em; }

/* Status cycle */
.status-cycle { display: flex; gap: 4px; margin-top: 10px; }
.cycle-btn {
  flex: 1;
  font-family: var(--fm);
  font-size: 9px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  padding: 5px 0;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--muted);
  cursor: pointer;
  transition: all 0.15s;
}
.cycle-btn:hover { color: var(--text); border-color: var(--border2); }
.cycle-btn.cur-todo        { background:rgba(0,200,255,0.1); border-color:rgba(0,200,255,0.35); color:var(--neon-b); }
.cycle-btn.cur-in_progress { background:rgba(199,125,255,0.1);border-color:rgba(199,125,255,0.35);color:var(--neon-p); }
.cycle-btn.cur-done        { background:rgba(0,255,163,0.1); border-color:rgba(0,255,163,0.35);  color:var(--neon-g); }

/* Empty col */
.col-empty { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; color:var(--dim); padding:24px; }
.col-empty-icon { font-size: 20px; }
.col-empty-msg  { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; text-align: center; }

/* ── Toast ── */
.toast-rack { position:fixed; bottom:24px; right:24px; z-index:9998; display:flex; flex-direction:column; gap:8px; pointer-events:none; }
.toast {
  font-family: var(--fm);
  font-size: 11px;
  letter-spacing: 0.04em;
  background: var(--surface2);
  color: var(--text);
  border: 1px solid var(--border2);
  border-left: 3px solid var(--neon-g);
  padding: 11px 16px;
  border-radius: 6px;
  animation: tIn 0.25s ease both;
  min-width: 200px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
}
.toast.err { border-left-color: var(--neon-r); }
@keyframes tIn  { from { opacity:0; transform:translateX(16px); } to { opacity:1; transform:none; } }
@keyframes tOut { to   { opacity:0; transform:translateX(16px); } }

.spin { display:inline-block; width:12px; height:12px; border:2px solid rgba(8,11,16,0.3); border-top-color:var(--bg); border-radius:50%; animation:rot 0.6s linear infinite; vertical-align:middle; }
@keyframes rot { to { transform:rotate(360deg); } }

/* ── Responsive ── */
@media (max-width: 900px) {
  .shell { grid-template-columns: 1fr; }
  .sidebar { position:static; height:auto; }
  .kanban { grid-template-columns: 1fr; }
}
@media (max-width: 600px) {
  .content { padding: 14px 16px; }
  .topbar  { padding: 14px 16px; }
}
</style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="shell">

  <!-- ── SIDEBAR ── -->
  <aside class="sidebar">

    <div class="logo">
      <div class="logo-eyebrow">Task Manager v2</div>
      <div class="logo-word">Flow<em>Task</em></div>
      <div class="conn-pill">
        <div class="conn-dot" id="connDot"></div>
        <span id="connLabel">connecting…</span>
      </div>
    </div>

    <!-- Completion ring -->
    <div class="ring-group">
      <div class="ring-label">Completion rate</div>
      <div class="ring-row">
        <div class="ring-wrap">
          <svg width="56" height="56" viewBox="0 0 56 56">
            <circle class="ring-track" cx="28" cy="28" r="22"/>
            <circle class="ring-fill" id="ringFill" cx="28" cy="28" r="22"
              stroke="var(--neon-g)"
              stroke-dasharray="138.23"
              stroke-dashoffset="138.23"/>
          </svg>
          <div class="ring-center" id="ringPct">0%</div>
        </div>
        <div class="ring-info">
          <div class="ring-info-title" id="ringDone">0 done</div>
          <div class="ring-info-sub"   id="ringTotal">of 0 tasks</div>
        </div>
      </div>
    </div>

    <!-- Stats -->
    <div class="stat-grid">
      <div class="stat-tile"><div class="stat-n b" id="sTotal">0</div><div class="stat-l">Total</div></div>
      <div class="stat-tile"><div class="stat-n r" id="sHigh">0</div><div class="stat-l">High</div></div>
      <div class="stat-tile"><div class="stat-n y" id="sPend">0</div><div class="stat-l">Pending</div></div>
      <div class="stat-tile"><div class="stat-n g" id="sDone">0</div><div class="stat-l">Done</div></div>
    </div>

    <div class="sidebar-date" id="sideDate"></div>
  </aside>

  <!-- ── MAIN ── -->
  <div class="main">
    <div class="topbar">
      <div class="topbar-title">Board View</div>
      <div class="topbar-pill" id="taskCountPill">0 tasks</div>
      <div class="topbar-pill">api :5000</div>
    </div>

    <div class="content">

      <!-- Add task -->
      <div class="add-panel">
        <div class="add-label">// new_task</div>
        <div class="add-row">
          <input class="add-input" id="taskInput" placeholder="Describe the task…"
            autocomplete="off" onkeydown="if(event.key==='Enter') addTask()">
          <button class="btn-add" id="addBtn" onclick="addTask()">+ ADD</button>
        </div>
        <div class="pri-pills">
          <button class="pri-pill" data-v="low"    onclick="setPri(this,'low')">▲ Low</button>
          <button class="pri-pill" data-v="medium" onclick="setPri(this,'medium')">▲▲ Medium</button>
          <button class="pri-pill" data-v="high"   onclick="setPri(this,'high')">▲▲▲ High</button>
        </div>
      </div>

      <!-- Filters -->
      <div class="filter-bar">
        <div class="search-wrap">
          <span class="search-icon">⌕</span>
          <input class="search-input" id="searchInput" placeholder="Search tasks…"
            oninput="debounce()" autocomplete="off">
        </div>
        <div class="filter-sep"></div>
        <button class="fchip" data-filter="priority" data-val="high"   onclick="toggleChip(this)">High</button>
        <button class="fchip" data-filter="priority" data-val="medium" onclick="toggleChip(this)">Med</button>
        <button class="fchip" data-filter="priority" data-val="low"    onclick="toggleChip(this)">Low</button>
        <div class="filter-sep"></div>
        <button class="fchip" data-filter="status" data-val="todo"        onclick="toggleChip(this)">Todo</button>
        <button class="fchip" data-filter="status" data-val="in_progress" onclick="toggleChip(this)">In Progress</button>
        <button class="fchip" data-filter="status" data-val="done"        onclick="toggleChip(this)">Done</button>
      </div>

      <!-- Kanban board -->
      <div class="kanban">
        <div class="col">
          <div class="col-head">
            <div class="col-dot todo"></div>
            <div class="col-title">To Do</div>
            <div class="col-count" id="cnt-todo">0</div>
          </div>
          <div class="col-body" id="body-todo"></div>
        </div>
        <div class="col">
          <div class="col-head">
            <div class="col-dot prog"></div>
            <div class="col-title">In Progress</div>
            <div class="col-count" id="cnt-in_progress">0</div>
          </div>
          <div class="col-body" id="body-in_progress"></div>
        </div>
        <div class="col">
          <div class="col-head">
            <div class="col-dot done"></div>
            <div class="col-title">Done</div>
            <div class="col-count" id="cnt-done">0</div>
          </div>
          <div class="col-body" id="body-done"></div>
        </div>
      </div>

    </div>
  </div>
</div>

<div class="toast-rack" id="toastRack"></div>

<script>
const API = "http://172.24.10.20:5000";
let selectedPri = 'medium';
let filters = { priority: null, status: null };
let debTimer;
const CIRC = 138.23; // 2π×22

/* ── Date ── */
const now = new Date();
document.getElementById('sideDate').innerHTML =
  now.toLocaleDateString('en-US',{weekday:'long'}).toUpperCase() + '<br>' +
  now.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});

/* ── Priority selection ── */
function setPri(el, v) {
  selectedPri = v;
  document.querySelectorAll('.pri-pill').forEach(b => {
    b.className = 'pri-pill';
    if (b.dataset.v === v) b.classList.add('sel-' + v);
  });
}
setPri(document.querySelector('[data-v="medium"]'), 'medium');

/* ── Health check ── */
async function healthCheck() {
  try {
    await fetch(API + '/health');
    document.getElementById('connDot').className = 'conn-dot on';
    document.getElementById('connLabel').textContent = 'connected';
  } catch {
    document.getElementById('connDot').className = 'conn-dot off';
    document.getElementById('connLabel').textContent = 'offline';
  }
}

/* ── Filters ── */
function toggleChip(el) {
  const f = el.dataset.filter, v = el.dataset.val;
  document.querySelectorAll(`.fchip[data-filter="${f}"]`).forEach(c => c.classList.remove('active'));
  if (filters[f] === v) filters[f] = null;
  else { filters[f] = v; el.classList.add('active'); }
  loadTasks();
}

function debounce() {
  clearTimeout(debTimer);
  debTimer = setTimeout(loadTasks, 260);
}

/* ── Load tasks ── */
async function loadTasks() {
  const search = document.getElementById('searchInput').value.trim();
  const p = new URLSearchParams();
  if (search) p.set('search', search);
  if (filters.priority) p.set('priority', filters.priority);
  if (filters.status)   p.set('status',   filters.status);

  try {
    const res  = await fetch(`${API}/tasks?${p}`);
    const data = await res.json();
    renderBoard(data);
    updateStats(data);
    document.getElementById('taskCountPill').textContent = data.length + ' task' + (data.length !== 1 ? 's' : '');
  } catch {
    ['todo','in_progress','done'].forEach(s => {
      document.getElementById('body-' + s).innerHTML =
        `<div class="col-empty"><div class="col-empty-icon">⚠</div><div class="col-empty-msg">Connection error</div></div>`;
    });
  }
}

function renderBoard(tasks) {
  const groups = { todo:[], in_progress:[], done:[] };
  tasks.forEach(t => { (groups[t.status] || groups.todo).push(t); });

  for (const [status, list] of Object.entries(groups)) {
    const body  = document.getElementById('body-' + status);
    document.getElementById('cnt-' + status).textContent = list.length;

    if (!list.length) {
      body.innerHTML = `<div class="col-empty"><div class="col-empty-icon">◌</div><div class="col-empty-msg">Nothing here</div></div>`;
      continue;
    }

    body.innerHTML = '';
    list.forEach((t, i) => {
      const el  = document.createElement('div');
      const isDone = t.status === 'done';
      el.className = `task-card p-${t.priority}${isDone ? ' done-card' : ''}`;
      el.id = 'card-' + t.id;
      el.style.animationDelay = (i * 0.04) + 's';

      const dateStr = new Date(t.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric'});
      const statuses = ['todo','in_progress','done'];
      const labels   = {todo:'Todo', in_progress:'In Prog', done:'Done'};
      const cycles = statuses.map(s =>
        `<button class="cycle-btn${s===t.status?' cur-'+s:''}" onclick="setStatus(${t.id},'${s}')">${labels[s]}</button>`
      ).join('');

      el.innerHTML = `
        <div class="card-top">
          <div class="task-title">${esc(t.title)}</div>
          <button class="btn-del" onclick="deleteTask(${t.id})" title="Delete">×</button>
        </div>
        <div class="card-foot">
          <span class="pri-badge ${t.priority}">${t.priority}</span>
          <span class="card-date">${dateStr}</span>
        </div>
        <div class="status-cycle">${cycles}</div>`;

      body.appendChild(el);
    });
  }
}

function updateStats(tasks) {
  const done  = tasks.filter(t => t.status === 'done').length;
  const total = tasks.length;
  const pct   = total ? Math.round((done / total) * 100) : 0;

  document.getElementById('sTotal').textContent = total;
  document.getElementById('sHigh').textContent  = tasks.filter(t => t.priority === 'high').length;
  document.getElementById('sPend').textContent  = tasks.filter(t => t.status !== 'done').length;
  document.getElementById('sDone').textContent  = done;

  document.getElementById('ringFill').style.strokeDashoffset = CIRC - (CIRC * pct / 100);
  document.getElementById('ringPct').textContent   = pct + '%';
  document.getElementById('ringDone').textContent  = done + ' done';
  document.getElementById('ringTotal').textContent = 'of ' + total + ' tasks';
}

/* ── Add ── */
async function addTask() {
  const input = document.getElementById('taskInput');
  const title = input.value.trim();
  if (!title) { toast('Enter a task title', true); return; }

  const btn = document.getElementById('addBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span>';

  try {
    await fetch(API + '/tasks', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title, priority: selectedPri })
    });
    input.value = '';
    toast('Task created');
    loadTasks();
  } catch { toast('Failed to add task', true); }
  finally {
    btn.disabled = false;
    btn.innerHTML = '+ ADD';
  }
}

/* ── Set status ── */
async function setStatus(id, status) {
  try {
    await fetch(`${API}/tasks/${id}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status })
    });
    loadTasks();
  } catch { toast('Update failed', true); }
}

/* ── Delete ── */
async function deleteTask(id) {
  const el = document.getElementById('card-' + id);
  if (el) { el.style.opacity = '0.2'; el.style.pointerEvents = 'none'; }
  try {
    await fetch(`${API}/tasks/${id}`, { method: 'DELETE' });
    toast('Task deleted');
    loadTasks();
  } catch {
    if (el) { el.style.opacity = ''; el.style.pointerEvents = ''; }
    toast('Delete failed', true);
  }
}

/* ── Toast ── */
function toast(msg, err = false) {
  const rack = document.getElementById('toastRack');
  const el = document.createElement('div');
  el.className = 'toast' + (err ? ' err' : '');
  el.textContent = msg;
  rack.appendChild(el);
  setTimeout(() => {
    el.style.animation = 'tOut 0.25s ease forwards';
    setTimeout(() => el.remove(), 250);
  }, 2600);
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── Init ── */
healthCheck();
loadTasks();
</script>
</body>
</html>
